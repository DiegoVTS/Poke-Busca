<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Buscador de Pokémon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Titan+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
    <title>PokéBusca</title>
    
</head>
<body>
    <header id="cabecalho">
        <h1>PokéBusca</h1>
    </header>
    <main id="conteudo">
        <div id="grid-card">
            <form action="index.js" id="form-buscar">
                <label for="name">Nome Pokémom</label>
                <input type="text" name="name" id="name" placeholder="Escreva Um Nome de Pokémon Existente" >
                <button type="submit" id="btn">Buscar</button>
                <p hidden id="erro">POKÉMON NÃO ENCONTRADO, Procure ou Escreva Outro Nome</p>
            </form>
            <section id="pesquisados">
                <h2>Últimos 5 Pokémons Buscados</h2>
                <ol id="ultimos5">
                    
                </ol>
            </section>
        </div>
        <section id="info-poke">
            <h2>Informações do Pokémon</h2>
            <img src="" alt="">
            <ul id="stats">
            </ul>
        </section>
    </main>
    <footer id="rodape">

    </footer>


    <script src="src/index.js"></script>
</body>
</html>
